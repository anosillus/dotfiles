[[plugins]]
repo = 'Shougo/dein.vim'

# complete {{{
[[plugins]]
repo = 'neoclide/coc-neco'
[[plugins]]
repo = 'neoclide/coc-sources'
[[plugins]]
repo = 'neoclide/coc.nvim'
rev = 'release'
on_i = 1
merged = '0'
hook_add = 'source ~/.vim/rc/plugins/coc.rc.vim'
# }}}

# filetype {{{
[[plugins]]
repo = 'sheerun/vim-polyglot'
hook_add = '''
let g:polyglot_disabled = ['markdown', 'tsx', 'typescript', 'csv', 'cpp']
let g:loaded_sleuth = 1
'''
[[plugins]]
repo = 'romainl/vim-devdocs'
[[plugins]]
repo = 'thinca/vim-ref'
hook_add = '''
let g:ref_no_default_key_mappings = 1
let g:ref_man_lang = 'ja'
let g:ref_pydoc_cmd = 'python3 -m pydoc'
let g:ref_cache_dir = $HOME . '/.vim/vim-ref/cache'
let g:ref_use_cache           = 1
let g:ref_use_vimproc         = 1
'''
[[plugins]]
repo = 'ryanoasis/vim-devicons'
# }}}

# View {{{
[[plugins]]
repo = 'ap/vim-css-color'
# Lightline {{{
[[plugins]]
repo = 'itchyny/lightline.vim'
hook_add = 'source ~/.vim/rc/plugins/lightline.rc.vim'
depends = ['vista', 'vim-devicons','lightline-ale']
# }}}

[[plugins]]
repo = 'maximbaz/lightline-ale'
[[plugins]]
repo = 'Yggdroot/indentLine'
[[plugins]]
repo = 'markonm/traces.vim'
[[plugins]]
repo = 'wakatime/vim-wakatime'
hook_source = '''
let g:wakatime_PythonBinary = g:python3_host_prog
'''
# }}}

# dependent {{{
[[plugins]]
repo = 'nixprime/cpsm'
build = 'sh -c "PY3=ON ./install.sh"'
[[plugins]]
repo = 'tyru/open-browser.vim'
[[plugins]]
repo = 'kana/vim-operator-user'
[[plugins]]
repo = 'kana/vim-textobj-user'
# }}}

# Configs {{{
[[plugins]]
repo ='editorconfig/editorconfig-vim'
[[plugins]]
repo = 'vim-scripts/autodate.vim'
[[plugins]]
repo = 'thinca/vim-ft-help_fold'
[[plugins]]
repo = 'thinca/vim-ft-diff_fold'
[[plugins]]
repo = 'Konfekt/FastFold'
hook_add = '''
let g:fastfold_savehook = 1
let g:fastfold_fdmhook = 0
let g:fastfold_fold_movement_commands = [']m', '[m', 'mk']
'''
[[plugin]]
repo = 'skanehira/gh.vim'
# config }}}

[[plugins]]
repo = 'lambdalisue/gina.vim'

[[plugins]]
repo = 'chrisbra/unicode.vim'

[[plugins]]
repo = 'yuttie/comfortable-motion.vim'
hook_add = '''
let g:comfortable_motion_no_default_key_mappings = 1
noremap <silent> <ScrollWheelDown> :call comfortable_motion#flick(40)<CR>
noremap <silent> <ScrollWheelUp>   :call comfortable_motion#flick(-40)<CR>
'''

# action {{{
# emment {{{
[[plugins]]
repo = 'mattn/emmet-vim'
hook_add = '''
let g:user_emmet_install_global = 1
let g:user_emmet_mode='vn'
let g:user_emmet_leader_key='<C-/>'
'''

[[plugins]]
repo = 'pbrisbin/vim-mkdir'
[[plugins]]
repo = 'junegunn/fzf'
[[plugins]]
repo = 'previm/previm'
[[plugins]]
repo = 'azadkuh/vim-cmus'
# }}}

# command }}}

# nvim_setting {{{
[[plugins]]
repo = 'roxma/vim-hug-neovim-rpc'
on_if = '!has("nvim")'

[[plugins]]
repo = 'roxma/nvim-yarp'

[[plugins]]
repo = 'Shougo/vimproc.vim'
build = 'make'
# }}}

