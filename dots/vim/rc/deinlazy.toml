# Motion  {{{
# is.vim {{{
[[plugins]]
repo = 'osyo-manga/vim-anzu'
on_map = {n = '<Plug>'}

[[plugins]]
repo = 'haya14busa/vim-asterisk'
on_map = {n = '<Plug>'}

[[plugins]]
repo = 'haya14busa/is.vim'
depends = ['vim-anzu', 'vim-asterisk']
hook_source = 'let g:is#do_default_mappings = 0'
hook_add = '''
map *  <Plug>(asterisk-z*)<Plug>(is-nohl-1)
map g* <Plug>(asterisk-gz*)<Plug>(is-nohl-1)
map #  <Plug>(asterisk-z#)<Plug>(is-nohl-1)
map g# <Plug>(asterisk-gz#)<Plug>(is-nohl-1)
map k <Plug>(is-nohl)<Plug>(anzu-n-with-echo)
map K <Plug>(is-nohl)<Plug>(anzu-N-with-echo)
noremap  <silent> <Esc><Esc> :<C-u>nohlsearch<CR><bar><Plug>(anzu-clear-search-status)
'''
on_map = {n = '<Plug>', x = '<Plug>'}
# }}}
# easymotion {{{
[[plugins]]
repo = 'easymotion/vim-easymotion'
on_map = '<Plug>'
on_func = ['EasyMotion#go']
hook_source = '''
let g:EasyMotion_keys = 'neihdoarstdluyfwp;qj,.'
" let g:EasyMotion_use_smartsign_us = 1
let g:EasyMotion_do_mapping = 0
" Do not shade
let g:EasyMotion_do_shade = 0
" Use upper case
let g:EasyMotion_use_upper = 1
" Smartcase
let g:EasyMotion_smartcase = 1
" Smartsign
let g:EasyMotion_use_smartsign_us = 1
" keep cursor column
let g:EasyMotion_startofline = 0
" Don't skip folded line
let g:EasyMotion_skipfoldedline = 0
" pseudo-migemo
let g:EasyMotion_use_migemo = 1
" Jump to first with enter & space
let g:EasyMotion_space_jump_first = 1
" Prompt
let g:EasyMotion_prompt = '{n}> '
'''
hook_add = '''
nmap <leader>s <Plug>(easymotion-overwin-f2)
xmap <leader>s <Plug>(easymotion-bd-f2)
" smart f & F
omap f <Plug>(easymotion-bd-fl)
xmap f <Plug>(easymotion-bd-fl)
omap F <Plug>(easymotion-Fl)
xmap F <Plug>(easymotion-Fl)
omap p <Plug>(easymotion-tl)
xmap p <Plug>(easymotion-tl)
omap P <Plug>(easymotion-Tl)
xmap P <Plug>(easymotion-Tl)
map <C-n> <Plug>(easymotion-j)
map <C-e> <Plug>(easymotion-k)
map U <Plug>(easymotion-linebackward)
map Y <Plug>(easymotion-lineforward)
nmap <Leader>w <Plug>(easymotion-overwin-w)
xmap <Leader>w <Plug>(easymotion-bd-w)
omap <Leader>w <Plug>(easymotion-bd-w)
'''
on_map = {n = '<Plug>', x = '<Plug>'}
# }}}
# incsearch {{{
[[plugins]]
repo = 'haya14busa/incsearch-easymotion.vim'
[[plugins]]
repo = 'haya14busa/incsearch-migemo.vim'
[[plugins]]
repo = 'haya14busa/incsearch-fuzzy.vim'

[[plugins]]
repo = 'haya14busa/incsearch.vim'
on_map = '<Plug>',
on_func = 'incsearch#go'
depends = ['incsearch-easymotion.vim','incsearch-migemo.vim', 'incsearch-fuzzy.vim']
hook_source = '''
  let g:incsearch#auto_nohlsearch = 1
  let g:incsearch#consistent_n_direction = 1
  let g:incsearch#do_not_save_error_message_history = 1
'''
hook_add = '''
  function! s:incsearch_config(...) abort
    return incsearch#util#deepextend(deepcopy({
    \   'modules': [incsearch#config#easymotion#module({'overwin': 1})],
    \   'keymap': {
    \     "\<CR>": '<Over>(easymotion)'
    \   },
    \   'is_expr': 0
    \ }), get(a:, 1, {}))
  endfunction

  function! s:config_migemo(...) abort
  return extend(copy({
  \   'converters': [
  \     incsearch#config#migemo#converter(),
  \   ],
  \   'modules': [incsearch#config#easymotion#module({'overwin': 1})],
  \   'keymap': {"\<C-l>": '<Over>(easymotion)'},
  \   'is_expr': 0,
  \ }), get(a:, 1, {}))
  endfunction

  function! s:config_easyfuzzymotion(...) abort
  return extend(copy({
  \   'converters': [incsearch#config#fuzzyword#converter()],
  \   'modules': [incsearch#config#easymotion#module({'overwin': 1})],
  \   'keymap': {"\<CR>": '<Over>(easymotion)'},
  \   'is_expr': 0,
  \   'is_stay': 1
  \ }), get(a:, 1, {}))
  endfunction
  noremap  <silent><expr> ,  incsearch#go(<SID>incsearch_config())
  noremap  <silent><expr> ?  incsearch#go(<SID>incsearch_config({'command': '?'}))
  noremap <silent><expr> g, incsearch#go(<SID>incsearch_config({'is_stay': 1}))
  noremap  <silent><expr> m, incsearch#go(<SID>config_migemo())
  noremap  <silent><expr> m? incsearch#go(<SID>config_migemo({'command': '?'}))
  noremap  <silent><expr> <Leader>, incsearch#go(<SID>config_easyfuzzymotion())
  if !has('patch-8.0.1238')
    noremap <silent><expr> /  incsearch#go(<SID>incsearch_config())
    noremap <silent><expr> ?  incsearch#go(<SID>incsearch_config({'command': '?'}))
    omap /  <Plug>(incsearch-forward)
    omap ?  <Plug>(incsearch-backward)
    noremap ;/ /
    noremap ;? ?
  endif
  omap g/ <Plug>(incsearch-stay)
'''
on_map = '<Plug>'

# }}}
# edgemotion {{{
[[plugins]]
repo = 'haya14busa/vim-edgemotion'
merged = 0
hook_add = '''
map  N <Plug>(edgemotion-j)
map  E <Plug>(edgemotion-k)
'''
on_map = {n = '<Plug>', x = '<Plug>'}
# }}}
# end Motion }}}
