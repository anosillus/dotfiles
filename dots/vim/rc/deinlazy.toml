[[plugins]]
repo = 'Shougo/denite.nvim'
on_cmd = 'Denite'
hook_source = 'source ~/.vim/rc/plugins/denite.rc.vim'
hook_add = '''
  nnoremap <silent><leader>m :Denite mark <CR>
  nnoremap <C-w> :<C-u>DeniteCursorWord grep <CR>
  nnoremap <silent> <C-v>
        \ :<C-u>Denite -buffer-name=register
        \ register neoyank<CR>
  xnoremap <silent> jr
        \ :<C-u>Denite -default-action=replace -buffer-name=register
        \ register neoyank<CR>
  nnoremap <silent> <Leader><Leader>
  \ :<C-u>Denite file/rec:~/.vim/rc<CR>
  nnoremap <silent><expr> g, wordcount().chars > 30000 ?
  \ ":\<C-u>Denite -buffer-name=search -start-filter
  \  -search line/external\<CR>" :
  \ ":\<C-u>Denite -buffer-name=search -start-filter -search line\<CR>"
  nnoremap <silent><expr> * wordcount().chars > 30000 ?
  \ ":\<C-u>DeniteCursorWord -buffer-name=search -search line/external\<CR>" :
  \ ":\<C-u>DeniteCursorWord -buffer-name=search -search line\<CR>"
  xnoremap <silent> *
  \ "qy:Denite -input=`@q` -buffer-name=search -search line<CR>
  nnoremap <silent><expr> <space>J finddir('.git', ';') != '' ?
  \ ":\<C-u>Denite -sorters=sorter/rank -unique
  \  file/point file/old file/dirty file/git file file:new\<CR>" :
  \ ":\<C-u>Denite -sorters=sorter/rank -unique
  \  file/point file/old file file:new\<CR>"
  nnoremap <silent> j,
  \ :<C-u>Denite -buffer-name=search -resume<CR>
  nnoremap <silent><expr> jt  &filetype == 'help' ?  "g\<C-]>" :
  \ ":\<C-u>DeniteCursorWord -buffer-name=tag -immediately tag:include\<CR>"
  nnoremap <silent><expr> jp  &filetype == 'help' ?
  \ ":\<C-u>pop\<CR>" : ":\<C-u>Denite jump\<CR>"
  nnoremap <silent> <Leader>j :<C-u>Denite dein<CR>
  nnoremap <silent> <Leader>J :<C-u>Denite ghq -default-action=cd<CR>
  nnoremap <silent> jg :<C-u>Denite -buffer-name=search
  \ -no-empty grep<CR>
  nnoremap <silent> ja :<C-u>Denite -buffer-name=deol -split=floating
  \ -cursor-pos=`tabpagenr()-1` deol:zsh<CR>
  nnoremap <silent> jz :<C-u>Denite change jump<CR>
  nnoremap <silent> <C-q> :<C-u>Denite change -start-filter<CR>

  nnoremap <silent> jb :<C-u>DeniteCursorWord help<CR>
  nnoremap <silent> j;
  \ :<C-u>Denite command command_history<CR>
'''

